# Generated by `cplt init` — review before trusting.
# Detected: JVM (Gradle), Docker, Spring Boot, TestContainers, Flyway

[propose]
# ⚠️  grants access to Docker socket — effectively root on the host
allow_docker = true
allow_jvm_attach = true
allow_localhost_any = true

[propose.allow]
ports = [5432]
localhost = [8080]

