name: digestabot

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

jobs:
  digestabot:
    name: Update image digests
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: navikt/digestabot@6c419f9c92ce6a841d25d44e1f91ae8d371ecdd3 # v1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          team: tilleggsstonader